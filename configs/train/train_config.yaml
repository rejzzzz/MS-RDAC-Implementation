# RDAC Training Configuration
# ===========================

# Data pipeline settings
dataset_params:
  train_dir: datasets/train
  test_dir: datasets/test
  cpk_path: '' # Pre-trained checkpoint path (leave empty for fresh training)
  frame_shape: [256, 256, 3]
  num_sources: 3 # Minimum 3 frames needed for temporal difference coder training
  target_delta: 1 # Frame spacing between consecutive animation targets
  augmentation_params:
    flip_param:
      horizontal_flip: False
      time_flip: False
    jitter_param:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.1
      hue: 0.1


# Architecture configuration
model_params:
  common_params:
    num_kp: 10
    num_channels: 3
  kp_detector_params:
    temperature: 0.1
    block_expansion: 32
    max_features: 1024
    scale_factor: 0.25
    num_blocks: 5
    quantize: False
  generator_params:
    block_expansion: 64
    max_features: 512
    num_down_blocks: 2
    num_bottleneck_blocks: 6
    estimate_occlusion_map: True
    motion_compensation: True  # Enable keypoint-driven residual warping
    ref_coder: False
    dense_motion_params:
      block_expansion: 64
      max_features: 1024
      num_blocks: 5
      scale_factor: 0.25
    iframe_params:
      variable_bitrate: True
      levels: 7
      scale_factor: 1
      input_resolution: [256,256]
    residual_coder_params:
      residual_type: 'residual' # [residual, conditional_residual]
      residual_features: 48
      variable_bitrate: True  # Single model supporting multiple bitrate operating points
      levels: 5
      scale_factor: 1 # Residual spatial scaling (keep at 1 during training)
      num_intermediate_layers: 3 # VAE encoder/decoder depth
      residual_coding: True  # Disable for animation-only baseline
      temporal_residual_coding: True # Encode temporal residual differences between frames
    refinement_network_params:
      gen_rec: True
      in_channel: 3 
      out_channel: 3 
      block_expansion: 64
  discriminator_params:
    scales: [1]
    block_expansion: 32
    max_features: 512
    num_blocks: 4
    use_kp: True
    disc_type: 'multi_scale' # Options: 'multi_scale', 'patch_gan_disc'




# Optimization schedule
train_params:
  step: 0 # Training phase: 0=end-to-end, 1=residual coders, 2=refinement net, 3=finetune
  num_epochs: 10 # Recommended: step0=30, step1=20, step2=10
  num_repeats: 10
  epoch_milestones: []
  lr: 2.0e-4
  lr_aux: 1.0e-4
  lr_discriminator: 2.0e-4
  betas: [0.5, 0.999]
  batch_size: 1
  scales: [1, 0.5, 0.25, 0.125]
  rd_lambda: [0.05, 0.1, 0.2, 0.4, 0.8, 1.2] # Rate-distortion trade-off weights
  target_rate: 2
  checkpoint_freq: 1
  transform_params:
    sigma_affine: 0.05
    sigma_tps: 0.005
    points_tps: 5
  loss_weights:
    generator_gan: 1
    discriminator_gan: 1
    feature_matching: [10, 10, 10, 10]
    perceptual: [10, 10, 10, 10, 10]
    equivariance_value: 10
    style_loss: 0

reconstruction_params:
  num_videos: 1000
  format: ".mp4"

visualizer_params:
  kp_size: 5
  draw_border: True
  colormap: "gist_rainbow"
